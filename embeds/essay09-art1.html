<div class="a1">
<svg viewBox="0 0 1000 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The three layers of a company — strategy, experience, substrate, stacked. The pain shows up at the top, in strategy; the cause almost always lives at the bottom, in the substrate.">
  <rect x="1" y="1" width="998" height="598" rx="14" fill="#faf8f4" stroke="#d4cfc3"/>
  <text class="eb" x="48" y="50" fill="#6e685e">FIGURE · THE THREE LAYERS OF A COMPANY</text>
  <line x1="48" y1="72" x2="952" y2="72" stroke="#d4cfc3"/>
  <g class="r s1">
    <rect x="48" y="108" width="610" height="120" rx="10" fill="#f3efe7" stroke="#d4cfc3" stroke-width="2"/>
    <text class="lbl" x="80" y="160" fill="#1a1815">STRATEGY</text>
    <text class="it" x="80" y="202" fill="#6e685e">the decisions — what to build, who to hire</text>
  </g>
  <g class="r s2">
    <rect x="48" y="244" width="610" height="120" rx="10" fill="#ece5d8" stroke="#d4cfc3" stroke-width="2"/>
    <text class="lbl" x="80" y="296" fill="#3a3631">EXPERIENCE</text>
    <text class="it" x="80" y="338" fill="#6e685e">how the company is lived, day to day</text>
  </g>
  <g class="r s3">
    <rect x="48" y="380" width="610" height="120" rx="10" fill="#ece5d8" stroke="#8b3a1f" stroke-width="2"/>
    <rect x="48" y="380" width="7" height="120" fill="#8b3a1f"/>
    <text class="lbl" x="80" y="432" fill="#8b3a1f">SUBSTRATE</text>
    <text class="it" x="80" y="474" fill="#3a3631">what the company actually is</text>
  </g>
  <g class="r s4">
    <text class="tag" x="720" y="124" fill="#3a3631">THE PAIN</text>
    <text class="it" x="720" y="156" fill="#6e685e">shows up here</text>
    <line x1="922" y1="178" x2="674" y2="178" stroke="#3a3631" stroke-width="2"/>
    <polygon points="674,178 688,171 688,185" fill="#3a3631"/>
  </g>
  <line class="accent" x1="700" y1="196" x2="700" y2="396" stroke="#c9a47e" stroke-width="2" stroke-dasharray="200" stroke-dashoffset="200"/>
  <g class="r s5">
    <polygon points="700,402 693,386 707,386" fill="#c9a47e"/>
    <text class="tag" x="720" y="430" fill="#8b3a1f">THE CAUSE</text>
    <text class="it" x="720" y="462" fill="#3a3631">lives here</text>
    <line x1="922" y1="440" x2="674" y2="440" stroke="#8b3a1f" stroke-width="2"/>
    <polygon points="674,440 688,433 688,447" fill="#8b3a1f"/>
  </g>
  <text class="cap" x="48" y="558" fill="#8b3a1f">Pain shows up at the top. The cause almost always lives at the bottom.</text>
</svg>
<style>
.a1{margin:0}
.a1 text{font-family:'Inter',sans-serif}
.a1 .eb{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.08em}
.a1 .lbl{font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.1em;font-weight:600}
.a1 .tag{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.09em;font-weight:600}
.a1 .it{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:27px}
.a1 .cap{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:25px}
.a1 .r{transform-box:fill-box;transform-origin:center}
.a1 .s1{animation:a1rise .8s .3s ease both}
.a1 .s2{animation:a1rise .8s .7s ease both}
.a1 .s3{animation:a1rise .8s 1.1s ease both}
.a1 .s4{animation:a1rise .8s 1.7s ease both}
.a1 .s5{animation:a1rise .8s 2.6s ease both}
.a1 .accent{animation:a1draw 1.0s 2.1s ease both}
@keyframes a1rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes a1draw{to{stroke-dashoffset:0}}
@media(prefers-reduced-motion:reduce){.a1 .s1,.a1 .s2,.a1 .s3,.a1 .s4,.a1 .s5,.a1 .accent{animation:none}.a1 .accent{stroke-dashoffset:0}}
</style>
</div>
