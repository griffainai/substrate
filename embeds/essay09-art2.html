<div class="a2">
<svg viewBox="0 0 1000 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="You don't introspect the substrate, you triangulate it. Four readings — what you say in private, what operators say separately, what customers buy, what the company protects under pressure — converge on the substrate at the center. The story you tell never reaches it.">
  <rect x="1" y="1" width="998" height="638" rx="14" fill="#faf8f4" stroke="#d4cfc3"/>
  <text class="eb" x="48" y="50" fill="#6e685e">FIGURE · YOU DON'T INTROSPECT THE SUBSTRATE — YOU TRIANGULATE IT</text>
  <line x1="48" y1="72" x2="952" y2="72" stroke="#d4cfc3"/>
  <!-- converging lines (draw inward) -->
  <line class="ln" x1="338" y1="198" x2="439" y2="311" stroke="#c9a47e" stroke-width="2.5" stroke-dasharray="151" stroke-dashoffset="151"/>
  <line class="ln" x1="662" y1="198" x2="561" y2="311" stroke="#c9a47e" stroke-width="2.5" stroke-dasharray="151" stroke-dashoffset="151"/>
  <line class="ln" x1="338" y1="522" x2="431" y2="441" stroke="#c9a47e" stroke-width="2.5" stroke-dasharray="123" stroke-dashoffset="123"/>
  <line class="ln" x1="662" y1="522" x2="569" y2="441" stroke="#c9a47e" stroke-width="2.5" stroke-dasharray="123" stroke-dashoffset="123"/>
  <circle class="dot" cx="439" cy="311" r="5" fill="#8b3a1f"/>
  <circle class="dot" cx="561" cy="311" r="5" fill="#8b3a1f"/>
  <circle class="dot" cx="431" cy="441" r="5" fill="#8b3a1f"/>
  <circle class="dot" cx="569" cy="441" r="5" fill="#8b3a1f"/>
  <!-- center substrate -->
  <g class="r cc">
    <circle cx="500" cy="380" r="92" fill="#ece5d8" stroke="#8b3a1f" stroke-width="3"/>
    <text class="lbl" x="500" y="372" fill="#8b3a1f" text-anchor="middle">THE SUBSTRATE</text>
    <text class="it" x="500" y="406" fill="#3a3631" text-anchor="middle">what it actually is</text>
  </g>
  <!-- four sources -->
  <g class="r bx">
    <rect x="48" y="118" width="290" height="80" rx="9" fill="#f3efe7" stroke="#d4cfc3" stroke-width="2"/>
    <text class="tag" x="72" y="152" fill="#1a1815">WHAT YOU SAY IN PRIVATE</text>
    <text class="it sm" x="72" y="180" fill="#6e685e">not the pitch — the late-night version</text>
  </g>
  <g class="r bx">
    <rect x="662" y="118" width="290" height="80" rx="9" fill="#f3efe7" stroke="#d4cfc3" stroke-width="2"/>
    <text class="tag" x="686" y="152" fill="#1a1815">WHAT OPERATORS SAY</text>
    <text class="it sm" x="686" y="180" fill="#6e685e">asked separately — the workaround</text>
  </g>
  <g class="r bx">
    <rect x="48" y="522" width="290" height="80" rx="9" fill="#f3efe7" stroke="#d4cfc3" stroke-width="2"/>
    <text class="tag" x="72" y="556" fill="#1a1815">WHAT CUSTOMERS BUY</text>
    <text class="it sm" x="72" y="584" fill="#6e685e">what they'd tell a peer they got</text>
  </g>
  <g class="r bx">
    <rect x="662" y="522" width="290" height="80" rx="9" fill="#f3efe7" stroke="#d4cfc3" stroke-width="2"/>
    <text class="tag" x="686" y="556" fill="#1a1815">WHAT IT PROTECTS</text>
    <text class="it sm" x="686" y="584" fill="#6e685e">what it saves under fire</text>
  </g>
  <!-- the story you tell — never reaches it -->
  <g class="r st">
    <rect x="360" y="120" width="280" height="66" rx="9" fill="#faf8f4" stroke="#d4cfc3" stroke-width="2"/>
    <text class="tag" x="500" y="150" fill="#6e685e" text-anchor="middle">THE STORY YOU TELL</text>
    <text class="it sm" x="500" y="176" fill="#6e685e" text-anchor="middle">what introspection returns</text>
  </g>
  <line class="stdraw" x1="500" y1="190" x2="500" y2="276" stroke="#d4cfc3" stroke-width="2" stroke-dasharray="86" stroke-dashoffset="86"/>
  <text class="it sm" x="612" y="266" fill="#6e685e">never quite reaches it</text>
  <text class="cap" x="48" y="616" fill="#8b3a1f">You can't introspect the substrate — you read it from four places the truth can't hide.</text>
</svg>
<style>
.a2{margin:0}
.a2 text{font-family:'Inter',sans-serif}
.a2 .eb{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.08em}
.a2 .lbl{font-family:'JetBrains Mono',monospace;font-size:21px;letter-spacing:.1em;font-weight:600}
.a2 .tag{font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:.07em;font-weight:600}
.a2 .it{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:25px}
.a2 .it.sm{font-size:22px}
.a2 .cap{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:25px}
.a2 .r{transform-box:fill-box;transform-origin:center}
.a2 .cc{animation:a2pop .7s .3s ease both}
.a2 .bx{animation:a2rise .8s .7s ease both}
.a2 .ln{animation:a2draw 1.1s 1.3s ease both}
.a2 .dot{animation:a2fade .6s 2.3s ease both}
.a2 .st{animation:a2rise .8s 2.7s ease both}
.a2 .stdraw{animation:a2draw .8s 3.1s ease both}
@keyframes a2rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes a2pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes a2draw{to{stroke-dashoffset:0}}
@keyframes a2fade{from{opacity:0}to{opacity:1}}
@media(prefers-reduced-motion:reduce){.a2 .cc,.a2 .bx,.a2 .ln,.a2 .dot,.a2 .st,.a2 .stdraw{animation:none}.a2 .ln,.a2 .stdraw{stroke-dashoffset:0}.a2 .dot{opacity:1}}
</style>
</div>
